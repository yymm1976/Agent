appId: com.routedev.app
productName: RouteDev
copyright: Copyright © 2026
asar: true
directories:
  # Phase 54：临时改为 release-v6 绕过 release-v4/v5 目录被锁定问题（TODO: 改回 release-v4）
  output: release-v6
  buildResources: build
files:
  - out/main/**/*
  - out/preload/**/*
  - out/renderer/**/*
  - package.json
# 将托盘图标打包到 resources 目录，供主进程在运行时通过 process.resourcesPath 访问
extraResources:
  - from: build/icon.png
    to: icon.png
    filter: ['**/*']
extraMetadata:
  main: out/main/index.js
win:
  target:
    - target: nsis
      arch:
        - x64
  signAndEditExecutable: false
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
mac:
  target:
    - dmg
  icon: build/icon.icns
linux:
  target:
    - AppImage
    - deb
  icon: build/icon.png



